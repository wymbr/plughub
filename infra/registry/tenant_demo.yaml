# infra/registry/tenant_demo.yaml
#
# Declaração completa do ambiente demo para o tenant_demo.
# Lido pelo RegistrySyncer no startup do orchestrator-bridge.
#
# Regras:
#   - pools são imutáveis após criação (estruturais — 409 é ignorado silenciosamente)
#   - agent_types são upsert (POST → 409 → PATCH para corrigir pools/permissões)
#   - Esta é a única fonte de verdade de configuração — não edite direto no banco
#
# Alterações aqui são aplicadas automaticamente no próximo restart do
# orchestrator-bridge, sem precisar de seed manual.

tenant_id: tenant_demo

# ─────────────────────────────────────────────────────────────────────────────
# Pools
# ─────────────────────────────────────────────────────────────────────────────

pools:

  - pool_id: demo_ia
    description: "Pool IA — entry point do fluxo IVR com botões (agente_demo_ia_v1)"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 480000

  - pool_id: sac_ia
    description: "Pool IA — atendimento SAC via LLM (Claude)"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 480000

  - pool_id: fila_humano
    description: "Pool intermediário — fila para agente humano"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 300000

  - pool_id: retencao_humano
    description: "Pool de agentes humanos — retenção e suporte especializado"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 300000
    # @mention routing: aliases disponíveis para agentes humanos desta fila
    # "@copilot" → convida/envia comando ao co-pilot SAC do pool copilot_sac
    mentionable_pools:
      copilot:    copilot_sac
      auth:       auth_ia       # @auth      → convida agente_auth_ia_v1 (PIN texto)
      auth_form:  auth_form_ia  # @auth_form → convida agente_auth_form_v1 (formulário)
    # Pool lifecycle hooks — acionam especialistas em pontos do ciclo de atendimento.
    # on_human_start: dispara quando o agente humano entra na sessão (Fase A — wired).
    # on_human_end:   dispara quando o agente humano chama agent_done (Fase B — stub).
    hooks:
      on_human_start: []  # vazio: copilot ainda é ativado manualmente via @mention
      on_human_end:
        - pool: finalizacao_ia  # Fase B: agente de finalização (NPS + encerramento)
      post_human: []

  - pool_id: avaliacao_ia
    # IMPORTANTE: este pool NÃO deve estar na cadeia de roteamento ao vivo.
    # Apenas agentes de avaliação pós-sessão devem ser registrados aqui.
    description: "Pool exclusivo para avaliação pós-sessão — sem tráfego ao vivo"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 600000

  - pool_id: contexto_ia
    # IMPORTANTE: pool de agentes especialistas em acumulação de contexto.
    # Invocados via task step (mode: assist) — sem tráfego direto de clientes.
    # Qualquer agente especialista pode invocar este pool para enriquecer
    # o contact_context antes de iniciar seu atendimento.
    description: "Pool de agentes especialistas em context-aware progressive resolution"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 30000

  - pool_id: copilot_sac
    # Pool do co-pilot especialista SAC.
    # Ativado via @mention pelo agente humano de retenção (@copilot).
    # Nunca recebe tráfego direto de clientes — apenas convites via conferência.
    description: "Pool do co-pilot SAC — especialista @mention com sugestões contextuais"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 15000

  - pool_id: auth_ia
    # Pool do agente de autenticação segura.
    # Executa o fluxo masked begin_transaction → coletar_pin → validar_pin → end_transaction.
    # Pode ser ativado diretamente ou via task step de outro agente.
    description: "Pool do agente de autenticação — fluxo masked com PIN seguro"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 60000

  - pool_id: auth_form_ia
    # Pool do agente de autenticação via formulário.
    # Demonstra field-level masking: email (plain) + senha + codigo_2fa (masked).
    # Ideal para testar a renderização do formulário mascarado no webchat.
    description: "Pool do agente de autenticação via formulário seguro — campos mistos"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 60000

  - pool_id: finalizacao_ia
    # Pool do agente de finalização de contato.
    # Acionado via pool hook on_human_end no pool retencao_humano (Fase B).
    # Responsabilidades: agradecimento, pesquisa NPS, encerramento da sessão.
    # Fase A: pool declarado e agent_type registrado — hook será wired na Fase B.
    description: "Pool do agente de finalização — agradecimento + NPS + encerramento"
    channel_types: [webchat, whatsapp]
    sla_target_ms: 120000

# ─────────────────────────────────────────────────────────────────────────────
# Agent Types
# ─────────────────────────────────────────────────────────────────────────────

agent_types:

  # IVR de entrada — botões, sem LLM
  - agent_type_id: agente_demo_ia_v1
    framework: plughub-native
    execution_model: stateless
    role: executor
    max_concurrent_sessions: 10
    pools: [demo_ia]
    skills: [{skill_id: skill_demo_ia_v1}]
    permissions:
      - mcp-server-plughub:agent_heartbeat
      - mcp-server-plughub:notification_send
      - mcp-server-plughub:conversation_escalate
      - mcp-server-plughub:interaction_request
    capabilities:
      channels: webchat,whatsapp

  # SAC via LLM (Claude)
  - agent_type_id: agente_sac_ia_v1
    framework: plughub-native
    execution_model: stateless
    role: executor
    max_concurrent_sessions: 10
    pools: [sac_ia]
    skills: [{skill_id: skill_sac_ia_v1}]
    permissions:
      - mcp-server-plughub:agent_heartbeat
      - mcp-server-plughub:notification_send
      - mcp-server-plughub:conversation_escalate
      - mcp-server-plughub:interaction_request
    capabilities:
      channels: webchat,whatsapp
      llm: "true"

  # Agente de fila — mantém o cliente esperando e escala para humano
  - agent_type_id: agente_fila_v1
    framework: plughub-native
    execution_model: stateless
    role: executor
    max_concurrent_sessions: 50
    pools: [fila_humano]
    skills: [{skill_id: skill_fila_v1}]
    permissions:
      - mcp-server-plughub:agent_heartbeat
      - mcp-server-plughub:notification_send
      - mcp-server-plughub:conversation_escalate
    capabilities:
      channels: webchat,whatsapp

  # Agente humano de retenção — gerenciado pelo Agent Assist UI
  - agent_type_id: agente_retencao_humano_v1
    framework: human
    execution_model: stateful
    role: executor
    max_concurrent_sessions: 3
    pools: [retencao_humano]
    skills: []
    permissions: []
    capabilities:
      channels: webchat,whatsapp

  # Agente de contexto — context-aware progressive resolution
  # Invocado via task step (mode: assist) por agentes que precisam de contexto enriquecido.
  # Nunca recebe tráfego direto — role: executor (specialist não é enum válido no Agent Registry).
  - agent_type_id: agente_contexto_ia_v1
    framework: plughub-native
    execution_model: stateless
    role: executor
    max_concurrent_sessions: 20
    pools: [contexto_ia]
    skills: [{skill_id: skill_contexto_ia_v1}]
    permissions:
      - mcp-server-plughub:agent_heartbeat
      - mcp-server-plughub:notification_send
      - mcp-server-plughub:interaction_request
      - mcp-server-crm:customer_get
    capabilities:
      channels: webchat,whatsapp
      llm: "true"
      context_resolution: "true"

  # Co-pilot especialista SAC — ativado via @mention pelo agente humano de retenção
  # Possui mention_commands: ativa, pausa, para
  - agent_type_id: agente_copilot_v1
    framework: plughub-native
    execution_model: stateless
    role: executor
    max_concurrent_sessions: 10
    pools: [copilot_sac]
    skills: [{skill_id: skill_copilot_sac_v1}]
    permissions:
      - mcp-server-plughub:agent_heartbeat
      - mcp-server-plughub:notification_send
      - mcp-server-plughub:interaction_request
    capabilities:
      channels: webchat,whatsapp
      llm: "true"
      copilot: "true"

  # Agente de autenticação — fluxo masked com begin/end_transaction
  # Verifica PIN do cliente via mcp-server-auth de forma segura (sem expor PIN)
  - agent_type_id: agente_auth_ia_v1
    framework: plughub-native
    execution_model: stateless
    role: executor
    max_concurrent_sessions: 20
    pools: [auth_ia]
    skills: [{skill_id: skill_auth_ia_v1}]
    permissions:
      - mcp-server-plughub:agent_heartbeat
      - mcp-server-plughub:notification_send
      - mcp-server-plughub:interaction_request
      - mcp-server-auth:validate_pin
      - mcp-server-auth:change_pin
    capabilities:
      channels: webchat,whatsapp
      masked_input: "true"

  # Agente de autenticação via formulário — campos mistos (email plain, senha+2fa masked)
  # Conecte o webchat ao pool auth_form_ia para testar a renderização do formulário seguro.
  - agent_type_id: agente_auth_form_v1
    framework: plughub-native
    execution_model: stateless
    role: executor
    max_concurrent_sessions: 20
    pools: [auth_form_ia]
    skills: [{skill_id: skill_auth_form_v1}]
    permissions:
      - mcp-server-plughub:agent_heartbeat
      - mcp-server-plughub:notification_send
      - mcp-server-plughub:interaction_request
      - mcp-server-auth:validate_pin
    capabilities:
      channels: webchat,whatsapp
      masked_input: "true"

  # Agente de finalização de contato — acionado via on_human_end hook (Fase B)
  # Envia agradecimento, coleta NPS e encerra o contato após o agente humano sair.
  - agent_type_id: agente_finalizacao_v1
    framework: plughub-native
    execution_model: stateless
    role: executor
    max_concurrent_sessions: 20
    pools: [finalizacao_ia]
    skills: [{skill_id: skill_finalizacao_v1}]
    permissions:
      - mcp-server-plughub:agent_heartbeat
      - mcp-server-plughub:notification_send
      - mcp-server-plughub:interaction_request
    capabilities:
      channels: webchat,whatsapp
      finalization: "true"

  # Agente de avaliação pós-sessão — NÃO deve estar em pool de roteamento ao vivo.
  # Recebe tráfego apenas via evaluation.requested (Session Replayer), nunca via
  # conversations.routed. Pool: avaliacao_ia (isolado).
  - agent_type_id: agente_avaliacao_v1
    framework: plughub-native
    execution_model: stateless
    role: evaluator
    max_concurrent_sessions: 20
    pools: [avaliacao_ia]
    skills: [{skill_id: skill_avaliacao_v1}]
    permissions:
      - mcp-server-plughub:evaluation_context_get
      - mcp-server-plughub:evaluation_submit
    capabilities:
      evaluation: "true"
