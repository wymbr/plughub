# docker-compose.demo.yml
# PlugHub Platform — Demo Environment (Arc 2 → Arc 7 completo)
#
# Stack completa: infra + todos os módulos de aplicação + observabilidade
#
# Uso:
#   docker compose -f docker-compose.demo.yml up --build
#   docker compose -f docker-compose.demo.yml up --build --scale e2e-runner=0  # sem runner
#   docker compose -f docker-compose.demo.yml logs -f e2e-runner               # acompanhar testes
#   docker compose -f docker-compose.demo.yml down -v                          # limpar ambiente
#
# ┌─ URLs de acesso ───────────────────────────────────────────────────────────┐
# │                                                                             │
# │  ★ Platform UI  (shell unificado — login real via auth-api)                │
# │    http://localhost:5174/login                                             │
# │    Login: admin@plughub.local / changeme_admin                            │
# │    Módulos: Monitor · Agent Assist · Avaliação · Faturamento ·            │
# │             Config · Skill Flows · Campanhas · Workflows                   │
# │                                                                             │
# │  ① Agent Assist UI  (legacy — agente humano direto)                        │
# │    http://localhost:5173?pool=retencao_humano&agent=agente_humano_v1-001  │
# │                                                                             │
# │  ② WebChat cliente  (consumidor final)                                     │
# │    http://localhost:5173/webchat-test.html                                │
# │                                                                             │
# │  Observabilidade                                                            │
# │    Kafdrop  (Kafka UI):         http://localhost:9001                     │
# │    Redis Commander (Redis UI):  http://localhost:8081                     │
# │                                                                             │
# │  APIs diretas (para debug)                                                 │
# │    auth-api:        http://localhost:3200/health                          │
# │    evaluation-api:  http://localhost:3400/health                          │
# │    knowledge-api:   http://localhost:3401/health                          │
# │    pricing-api:     http://localhost:3900/health                          │
# └─────────────────────────────────────────────────────────────────────────────┘
#
# Flags do runner (via E2E_EXTRA_ARGS):
#   E2E_EXTRA_ARGS="--demo"           # cenários 01–14 (padrão)
#   E2E_EXTRA_ARGS="--only 07"        # apenas cenário 07 (inbound full)
#   E2E_EXTRA_ARGS="--only 12"        # apenas cenário 12 (webchat)
#   E2E_EXTRA_ARGS="--only 13"        # apenas cenário 13 (workflow)
#   E2E_EXTRA_ARGS="--only 14"        # apenas cenário 14 (collect step)
#   E2E_EXTRA_ARGS="--conference"     # cenários 01–04 + 06
#   E2E_EXTRA_ARGS="--webchat"        # cenários 01–04 + 12
#   E2E_EXTRA_ARGS="--workflow"       # cenários 01–04 + 13 + 14
#   E2E_EXTRA_ARGS="--evaluation"     # cenários 01–04 + 24 + 25 (Arc 6)
#   E2E_EXTRA_ARGS="--hooks"          # cenário 22 (pool lifecycle hooks)
#   E2E_EXTRA_ARGS="--segments"       # cenário 23 (Arc 5 contact segments)
#   E2E_EXTRA_ARGS="--permissions"    # cenário 27 (Arc 6 v2 permissions)
#
# Variáveis de ambiente opcionais:
#   ANTHROPIC_API_KEY — para testes com inferência LLM real (cenários 19, 26)
#   OPENAI_API_KEY    — para embeddings reais no mcp-server-knowledge

name: plughub-demo

networks:
  plughub-demo:
    driver: bridge

volumes:
  kafka-data:
  postgres-data:
  redis-data:
  clickhouse-data:
  attachment-data:
  minio-data:

# ─────────────────────────────────────────────────────────────────────────────
# Testes manuais — roteiro de validação
# ─────────────────────────────────────────────────────────────────────────────
#
# Sobe toda a stack sem o runner de testes:
#   docker compose -f docker-compose.demo.yml up --build --scale e2e-runner=0
#
# ┌─ Roteiro de validação ────────────────────────────────────────────────────┐
# │                                                                            │
# │  PASSO 1 — Login no Platform UI (shell unificado)                        │
# │    http://localhost:5174/login                                            │
# │    Email: admin@plughub.local  Senha: changeme_admin                     │
# │                                                                            │
# │  PASSO 2 — Monitor operacional                                            │
# │    http://localhost:5174/monitor                                          │
# │    Heatmap de sentimento por pool · métricas 24h · drill-down de sessão  │
# │                                                                            │
# │  PASSO 3 — Agent Assist (atendimento humano)                             │
# │    http://localhost:5173?pool=retencao_humano&agent=agente_humano_v1-001 │
# │    Webchat do cliente: http://localhost:5173/webchat-test.html            │
# │                                                                            │
# │  PASSO 4 — Avaliação de Qualidade (Arc 6)                                │
# │    http://localhost:5174/evaluation/forms      ← criar formulário        │
# │    http://localhost:5174/evaluation/campaigns  ← criar campanha          │
# │    http://localhost:5174/evaluation/review     ← revisar avaliações      │
# │                                                                            │
# │  PASSO 5 — Configuração e Billing                                        │
# │    http://localhost:5174/config/platform  ← Config API por namespace     │
# │    http://localhost:5174/config/billing   ← Faturamento por capacidade   │
# │    http://localhost:5174/skill-flows      ← Editor Monaco de skills      │
# │                                                                            │
# │  Observabilidade                                                           │
# │    Kafdrop (Kafka UI):         http://localhost:9001                      │
# │    Redis Commander (Redis UI): http://localhost:8081                      │
# └────────────────────────────────────────────────────────────────────────────┘
#
# Fluxo de teste end-to-end manual:
#   1. Abra o Agent Assist UI com o pool desejado no parâmetro ?pool=
#   2. Abra webchat-test.html, selecione o mesmo pool e clique Conectar
#   3. Envie mensagens do cliente — o agente recebe em tempo real
#   4. Para pools de IA (sac_ia, demo_ia): o agente IA responde automaticamente
#   5. Para retencao_humano: o agente humano visualiza e pode responder
#
# Cenários novos — @mention e masked PIN:
#   @copilot (agente_copilot_v1 / pool copilot_sac):
#     - Abra Agent Assist UI no pool retencao_humano
#     - Abra webchat-test.html e conecte ao pool retencao_humano
#     - O agente humano digita "@copilot" → co-pilot entra em standby (agents_only)
#     - "@copilot ativa" → co-pilot analisa contexto e envia sugestão (agents_only)
#     - "@copilot para"  → co-pilot encerra
#
#   agente_auth_ia_v1 (pool auth_ia — fluxo masked PIN):
#     - Abra webchat-test.html e conecte ao pool auth_ia
#     - O agente solicita PIN via campo mascarado (overlay no webchat)
#     - PIN válido: 6 dígitos começando com "1" (ex: 123456)
#     - PIN de teste de falha: 999999

# ─────────────────────────────────────────────────────────────────────────────
# Infra
# ─────────────────────────────────────────────────────────────────────────────

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # 6379 pode estar em uso pela infra existente
    command: redis-server --save "" --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - plughub-demo

  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"   # 5432 pode estar em uso pela infra existente
    environment:
      POSTGRES_DB: plughub_demo
      POSTGRES_USER: plughub
      POSTGRES_PASSWORD: plughub
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plughub -d plughub_demo"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - plughub-demo

  kafka:
    image: apache/kafka:3.7.0
    ports:
      - "9093:9092"   # 9092 pode estar em uso pela infra existente
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093,INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - plughub-demo

  # Cria todos os tópicos Kafka necessários para a demo
  kafka-init:
    image: apache/kafka:3.7.0
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - plughub-demo
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        KAFKA=/opt/kafka/bin/kafka-topics.sh
        BROKER=kafka:29092
        TOPICS="
          conversations.inbound
          conversations.outbound
          conversations.routed
          conversations.queued
          conversations.dequeued
          conversations.abandoned
          conversations.events
          conversations.message_sent
          conversations.session_opened
          conversations.session_closed
          conversations.participants
          agent.lifecycle
          agent.done
          agent.registry.events
          queue.position_updated
          rules.escalation_triggered
          rules.notification_triggered
          rules.session_tagged
          gateway.heartbeat
          mcp.audit
          registry.changed
          config.changed
          evaluation.events
          usage.events
          sentiment.updated
          workflow.events
          calendar.events
          collect.events
        "
        for topic in $$TOPICS; do
          $$KAFKA --bootstrap-server $$BROKER --create --if-not-exists \
            --topic $$topic --partitions 3 --replication-factor 1
          echo "topic $$topic OK"
        done
        echo "All Kafka topics created."
    restart: "no"

# ─────────────────────────────────────────────────────────────────────────────
# Application Services
# ─────────────────────────────────────────────────────────────────────────────

  agent-registry:
    build:
      context: .
      dockerfile: packages/agent-registry/Dockerfile
    ports:
      - "3300:3300"
    environment:
      DATABASE_URL:   postgresql://plughub:plughub@postgres:5432/plughub_demo
      PORT:           "3300"
      JWT_SECRET:     demo_plughub_secret_32chars__
      KAFKA_BROKERS:  kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3300/v1/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - plughub-demo

  mcp-server-plughub:
    build:
      context: .
      dockerfile: packages/mcp-server-plughub/Dockerfile
    ports:
      - "3100:3100"
    environment:
      REDIS_URL: redis://redis:6379
      PORT: "3100"
      JWT_SECRET: demo_plughub_secret_32chars__
      KAFKA_BROKERS: kafka:29092
      AGENT_REGISTRY_URL: http://agent-registry:3300
      SKILL_FLOW_URL: http://skill-flow-service:3460
      PLUGHUB_TENANT_ID: tenant_demo
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      agent-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const r=require('http').get('http://localhost:3100/sse');r.on('response',s=>{s.destroy();process.exit(s.statusCode<500?0:1)});r.on('error',()=>process.exit(1));setTimeout(()=>{r.destroy();process.exit(1)},2000)\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - plughub-demo

  routing-engine:
    build:
      context: .
      dockerfile: packages/routing-engine/Dockerfile
    environment:
      PLUGHUB_REDIS_URL: redis://redis:6379
      PLUGHUB_KAFKA_BROKERS: kafka:29092
      PLUGHUB_AGENT_REGISTRY_URL: http://agent-registry:3300
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      agent-registry:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - plughub-demo
    restart: on-failure

  ai-gateway:
    build:
      context: .
      dockerfile: packages/ai-gateway/Dockerfile
    ports:
      - "3200:3200"
    environment:
      PLUGHUB_REDIS_URL: redis://redis:6379
      PLUGHUB_PORT: "3200"
      PLUGHUB_WORKERS: "1"
      PLUGHUB_ANTHROPIC_API_KEY: ${PLUGHUB_ANTHROPIC_API_KEY:-${ANTHROPIC_API_KEY:-}}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3200/v1/health', timeout=3)\" 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - plughub-demo

  rules-engine:
    build:
      context: .
      dockerfile: packages/rules-engine/Dockerfile
    ports:
      - "3201:3201"
    environment:
      PLUGHUB_REDIS_URL: redis://redis:6379
      PLUGHUB_MCP_SERVER_URL: http://mcp-server-plughub:3100
      PLUGHUB_API_PORT: "3201"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3201/rules?tenant_id=health_probe', timeout=3)\" 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - plughub-demo

  mcp-server-auth:
    build:
      context: packages/mcp-server-auth
      dockerfile: Dockerfile
    ports:
      - "3150:3150"
    environment:
      PORT: "3150"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3150/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - plughub-demo

  skill-flow-service:
    build:
      context: .
      dockerfile: packages/e2e-tests/services/skill-flow-service/Dockerfile
    # Porta interna 3460 — evaluation-api ocupa 3400 externamente
    # Sem mapeamento externo: somente acessível via rede interna plughub-demo
    environment:
      REDIS_URL: redis://redis:6379
      MCP_SERVER_URL: http://mcp-server-plughub:3100
      MCP_AUTH_URL:   http://mcp-server-auth:3150
      AI_GATEWAY_URL: http://ai-gateway:3200
      PORT: "3460"
      SKILLS_DIR: /app/skills
    depends_on:
      redis:
        condition: service_healthy
      mcp-server-plughub:
        condition: service_healthy
      mcp-server-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3460/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 25s
    networks:
      - plughub-demo

  session-replayer:
    build:
      context: .
      dockerfile: packages/session-replayer/Dockerfile
    environment:
      KAFKA_BROKERS:   kafka:29092
      REDIS_URL:       redis://redis:6379
      DATABASE_URL:    postgresql://plughub:plughub@postgres:5432/plughub_demo
      EVALUATOR_POOL:  avaliador_qualidade
      REPLAY_SPEED_FACTOR: "10.0"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - plughub-demo
    restart: on-failure

  usage-aggregator:
    build:
      context: packages/usage-aggregator
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS:  kafka:29092
      KAFKA_GROUP_ID: usage-aggregator-demo
      REDIS_URL:      redis://redis:6379
      DATABASE_URL:   postgresql://plughub:plughub@postgres:5432/plughub_demo
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - plughub-demo
    restart: on-failure

  auth-api:
    build:
      context: packages/auth-api
      dockerfile: Dockerfile
    ports:
      - "3200:3200"
    environment:
      PLUGHUB_AUTH_DATABASE_URL:        postgresql://plughub:plughub@postgres:5432/plughub_demo
      PLUGHUB_AUTH_JWT_SECRET:          changeme_auth_jwt_secret_demo_32c
      PLUGHUB_AUTH_ADMIN_TOKEN:         changeme_auth_admin_token_demo
      PLUGHUB_AUTH_SEED_ADMIN_EMAIL:    admin@plughub.local
      PLUGHUB_AUTH_SEED_ADMIN_PASSWORD: changeme_admin
      PLUGHUB_AUTH_SEED_TENANT_ID:      tenant_demo
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/health 2>/dev/null | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - plughub-demo
    restart: on-failure

  clickhouse:
    image: clickhouse/clickhouse-server:23.8
    ports:
      - "8123:8123"
    environment:
      CLICKHOUSE_DB:                       plughub_demo
      CLICKHOUSE_USER:                     plughub
      CLICKHOUSE_PASSWORD:                 plughub
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping 2>/dev/null | grep -q Ok"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s
    networks:
      - plughub-demo

  analytics-api:
    build:
      context: .
      dockerfile: packages/analytics-api/Dockerfile
    ports:
      - "3500:3500"
    environment:
      PLUGHUB_KAFKA_BROKERS:       kafka:29092
      PLUGHUB_KAFKA_GROUP_ID:      analytics-demo
      PLUGHUB_REDIS_URL:           redis://redis:6379
      PLUGHUB_CLICKHOUSE_HOST:     clickhouse
      PLUGHUB_CLICKHOUSE_PORT:     "8123"
      PLUGHUB_CLICKHOUSE_USER:     plughub
      PLUGHUB_CLICKHOUSE_PASSWORD: plughub
      PLUGHUB_CLICKHOUSE_DATABASE: plughub_demo
      PLUGHUB_ADMIN_JWT_SECRET:    demo_analytics_admin_secret
      PLUGHUB_ANALYTICS_OPEN_ACCESS: "true"   # bypass JWT auth in demo — dashboard accessible without token
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3500/v1/health', timeout=3)\" 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - plughub-demo

  # One-shot init container: creates platform_config table before config-api starts.
  # Uses the postgres:16-alpine image (psql already available — no Python/asyncpg needed).
  config-db-init:
    image: postgres:16-alpine
    environment:
      PGPASSWORD: plughub
    command:
      - sh
      - -c
      - |
        echo "Creating platform_config schema..."
        psql -h postgres -U plughub -d plughub_demo -v ON_ERROR_STOP=1 -c "
          CREATE TABLE IF NOT EXISTS platform_config (
            id          SERIAL PRIMARY KEY,
            tenant_id   TEXT        NOT NULL DEFAULT '__global__',
            namespace   TEXT        NOT NULL,
            key         TEXT        NOT NULL,
            value       JSONB       NOT NULL,
            description TEXT        NOT NULL DEFAULT '',
            updated_at  TIMESTAMPTZ NOT NULL DEFAULT now(),
            CONSTRAINT uq_platform_config UNIQUE (tenant_id, namespace, key)
          );
          CREATE INDEX IF NOT EXISTS idx_platform_config_lookup
            ON platform_config (tenant_id, namespace, key);
        " && echo "platform_config schema ready."
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - plughub-demo

  config-api:
    build:
      context: .
      dockerfile: packages/config-api/Dockerfile
    ports:
      - "3600:3600"
    environment:
      PLUGHUB_CONFIG_DATABASE_URL:  postgresql://plughub:plughub@postgres:5432/plughub_demo
      PLUGHUB_CONFIG_REDIS_URL:     redis://redis:6379
      PLUGHUB_CONFIG_ADMIN_TOKEN:   demo_config_admin_token
      PLUGHUB_CONFIG_KAFKA_BROKERS: kafka:29092
    depends_on:
      config-db-init:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3600/v1/health', timeout=3)\" 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    networks:
      - plughub-demo

  config-seed:
    build:
      context: .
      dockerfile: packages/config-api/Dockerfile
    environment:
      PLUGHUB_CONFIG_DATABASE_URL: postgresql://plughub:plughub@postgres:5432/plughub_demo
      PLUGHUB_CONFIG_REDIS_URL:    redis://redis:6379
    command: ["plughub-config-seed"]
    depends_on:
      config-api:
        condition: service_healthy
    networks:
      - plughub-demo
    restart: "no"

  # Registra pools e agent types no agent-registry e escreve pool_configs no Redis.
  # Roda uma vez na inicialização; idempotente — 409 → PUT para atualizar configuração.
  demo-seed:
    image: python:3.11-slim
    volumes:
      - ./infra/seed:/seed:ro
    environment:
      AGENT_REGISTRY_URL: http://agent-registry:3300
      REDIS_URL:          redis://redis:6379
      TENANT_ID:          tenant_demo
    command: ["python", "/seed/seed.py"]
    depends_on:
      agent-registry:
        condition: service_healthy
      config-seed:
        condition: service_completed_successfully
    networks:
      - plughub-demo
    restart: "no"

  pricing-api:
    build:
      context: .
      dockerfile: packages/pricing-api/Dockerfile
    ports:
      - "3900:3900"
    environment:
      PLUGHUB_PRICING_DATABASE_URL:    postgresql://plughub:plughub@postgres:5432/plughub_demo
      PLUGHUB_PRICING_CONFIG_API_URL:  http://config-api:3600
      PLUGHUB_PRICING_ADMIN_TOKEN:     demo_pricing_admin_token
    depends_on:
      postgres:
        condition: service_healthy
      config-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3900/health', timeout=3)\" 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    networks:
      - plughub-demo

  # ─── MinIO — S3-compatible object storage (sem custo, roda localmente) ────────
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console web → http://localhost:9001 (plughub / plughub123)
    environment:
      MINIO_ROOT_USER:     plughub
      MINIO_ROOT_PASSWORD: plughub123
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - plughub-demo

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 plughub plughub123 &&
        mc mb --ignore-existing local/plughub-attachments &&
        echo 'MinIO bucket plughub-attachments criado.' &&
        exit 0
      "
    networks:
      - plughub-demo

  channel-gateway:
    build:
      context: .
      dockerfile: packages/channel-gateway/Dockerfile
    ports:
      - "8010:8010"
    environment:
      PLUGHUB_KAFKA_BROKERS:              kafka:29092
      PLUGHUB_REDIS_URL:                  redis://redis:6379
      PLUGHUB_JWT_SECRET:                 changeme_32chars_webchat_secret!
      PLUGHUB_WS_AUTH_TIMEOUT_S:          "30"
      PLUGHUB_ATTACHMENT_EXPIRY_DAYS:     "7"
      PLUGHUB_DATABASE_URL:               postgresql://plughub:plughub@postgres:5432/plughub_demo
      PLUGHUB_WEBCHAT_SERVING_BASE_URL:   http://localhost:8010/webchat/v1/attachments
      PLUGHUB_WEBCHAT_UPLOAD_BASE_URL:    http://localhost:8010/webchat/v1/upload
      PLUGHUB_TENANT_ID:                  tenant_demo
      PLUGHUB_KAFKA_TOPIC_INBOUND:        conversations.inbound
      PLUGHUB_KAFKA_TOPIC_OUTBOUND:       conversations.outbound
      PLUGHUB_KAFKA_TOPIC_EVENTS:         conversations.events
      # S3/MinIO storage backend (fase 2)
      PLUGHUB_ATTACHMENT_STORE_TYPE:      s3
      PLUGHUB_S3_ENDPOINT_URL:            http://minio:9000
      PLUGHUB_S3_BUCKET:                  plughub-attachments
      PLUGHUB_S3_ACCESS_KEY:              plughub
      PLUGHUB_S3_SECRET_KEY:              plughub123
      PLUGHUB_S3_REGION:                  us-east-1
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=3)\" 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - plughub-demo

  calendar-api:
    build:
      context: .
      dockerfile: packages/calendar-api/Dockerfile
    ports:
      - "3700:3700"
    environment:
      PLUGHUB_CALENDAR_DATABASE_URL:  postgresql://plughub:plughub@postgres:5432/plughub_demo
      PLUGHUB_CALENDAR_REDIS_URL:     redis://redis:6379
      PLUGHUB_CALENDAR_KAFKA_BROKERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3700/v1/health', timeout=3)\" 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    networks:
      - plughub-demo

  workflow-api:
    build:
      context: packages/workflow-api
      dockerfile: Dockerfile
    ports:
      - "3800:3800"
    environment:
      PLUGHUB_WORKFLOW_DATABASE_URL:     postgresql://plughub:plughub@postgres:5432/plughub_demo
      PLUGHUB_WORKFLOW_REDIS_URL:        redis://redis:6379
      PLUGHUB_WORKFLOW_KAFKA_BROKERS:    kafka:29092
      PLUGHUB_WORKFLOW_KAFKA_TOPIC:      workflow.events
      PLUGHUB_WORKFLOW_CALENDAR_API_URL: http://calendar-api:3700
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      calendar-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3800/v1/health', timeout=3)\" 2>/dev/null && echo ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    networks:
      - plughub-demo

  skill-flow-worker:
    build:
      context: .
      dockerfile: packages/skill-flow-worker/Dockerfile
    environment:
      KAFKA_BROKERS:    kafka:29092
      REDIS_URL:        redis://redis:6379
      WORKFLOW_API_URL: http://workflow-api:3800
      MCP_SERVER_URL:   http://mcp-server-plughub:3100
      AI_GATEWAY_URL:   http://ai-gateway:3200
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      workflow-api:
        condition: service_healthy
      mcp-server-plughub:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure
    networks:
      - plughub-demo

  # Orchestrator Bridge — consumes conversations.routed from Kafka and publishes
  # conversation.assigned to Redis pub/sub pool:events:{poolId}.
  # Required for human agents: without this service, routed contacts never appear
  # in the Agent Assist UI.
  orchestrator-bridge:
    build:
      context: .
      dockerfile: packages/orchestrator-bridge/Dockerfile
    volumes:
      # Declarative registry config — RegistrySyncer reads this at startup and
      # upserts pools + agent types into the Agent Registry automatically.
      # No external seed script needed for a fresh environment.
      - ./infra/registry:/registry:ro
    environment:
      KAFKA_BROKERS:        kafka:29092
      REDIS_URL:            redis://redis:6379
      SKILL_FLOW_URL:       http://skill-flow-service:3460
      AGENT_REGISTRY_URL:   http://agent-registry:3300
      BOOTSTRAP_TENANT_IDS: tenant_demo
      REGISTRY_CONFIG_DIR:  /registry
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      agent-registry:
        condition: service_healthy
      skill-flow-service:
        condition: service_healthy
    restart: on-failure
    networks:
      - plughub-demo

  # ─── evaluation-api (Arc 6 — quality evaluation platform) ──────────────────
  evaluation-api:
    build:
      context: .
      dockerfile: packages/evaluation-api/Dockerfile
    ports:
      - "3400:3400"
    environment:
      PLUGHUB_EVALUATION_DATABASE_URL:        postgresql://plughub:plughub@postgres:5432/plughub_demo
      PLUGHUB_EVALUATION_REDIS_URL:           redis://redis:6379
      PLUGHUB_EVALUATION_KAFKA_BROKERS:       kafka:29092
      PLUGHUB_EVALUATION_ADMIN_TOKEN:         changeme_eval_admin_token_demo
      PLUGHUB_EVALUATION_JWT_SECRET:          changeme_auth_jwt_secret_demo_32c
      PLUGHUB_EVALUATION_CALENDAR_API_URL:    http://calendar-api:3700
      PLUGHUB_EVALUATION_WORKFLOW_API_URL:    http://workflow-api:3800
      PLUGHUB_EVALUATION_SESSION_REPLAYER_URL: http://mcp-server-plughub:3100
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3400/health')\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    networks:
      - plughub-demo

  # ─── mcp-server-knowledge (Arc 6 — RAG knowledge base) ──────────────────
  mcp-server-knowledge:
    build:
      context: .
      dockerfile: packages/mcp-server-knowledge/Dockerfile
    ports:
      - "3401:3401"
    environment:
      PORT:             "3401"
      DATABASE_URL:     postgresql://plughub:plughub@postgres:5432/plughub_demo
      ADMIN_TOKEN:      changeme_knowledge_admin_token_demo
      # EMBEDDING_PROVIDER: openai       # descomente para habilitar embeddings reais
      # OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3401/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: on-failure
    networks:
      - plughub-demo

  # ─── platform-ui (shell unificado — porta 5174) ──────────────────────────
  #   http://localhost:5174/login          ← login com credenciais reais (auth-api)
  #   http://localhost:5174/monitor        ← monitor operacional
  #   http://localhost:5174/agent-assist   ← agent assist integrado
  #   http://localhost:5174/evaluation     ← plataforma de avaliação Arc 6
  #   http://localhost:5174/config/billing ← faturamento Arc 2
  platform-ui:
    build:
      context: .
      dockerfile: packages/platform-ui/Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      auth-api:
        condition: service_healthy
      mcp-server-plughub:
        condition: service_healthy
      agent-registry:
        condition: service_healthy
      analytics-api:
        condition: service_healthy
      config-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5174/ > /dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: on-failure
    networks:
      - plughub-demo

  agent-assist-ui:
    build:
      context: .
      dockerfile: packages/agent-assist-ui/Dockerfile
    ports:
      - "5173:5173"
    environment:
      # Pool e agent type padrão exibidos na UI ao abrir sem query params
      VITE_DEFAULT_POOL:   retencao_humano
      VITE_TENANT_ID:      tenant_demo
    depends_on:
      mcp-server-plughub:
        condition: service_healthy
      analytics-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - plughub-demo

# ─────────────────────────────────────────────────────────────────────────────
# Observability
# ─────────────────────────────────────────────────────────────────────────────

  # Kafdrop — Kafka UI. Acesse: http://localhost:9001
  kafdrop:
    image: obsidiandynamics/kafdrop:4.0.2
    ports:
      - "9001:9000"   # 9000 pode estar em uso pela infra existente
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
      JVM_OPTS: "-Xms32M -Xmx64M"
      SERVER_SERVLET_CONTEXTPATH: "/"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - plughub-demo

  # Redis Commander — Redis UI. Acesse: http://localhost:8081
  redis-commander:
    image: ghcr.io/joeferner/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - plughub-demo

# ─────────────────────────────────────────────────────────────────────────────
# E2E Test Runner — executa os cenários e encerra
# ─────────────────────────────────────────────────────────────────────────────

  e2e-runner:
    build:
      context: .
      dockerfile: packages/e2e-tests/Dockerfile
    environment:
      MCP_SERVER_URL:           http://mcp-server-plughub:3100
      AGENT_REGISTRY_URL:       http://agent-registry:3300
      SKILL_FLOW_URL:           http://skill-flow-service:3460
      RULES_ENGINE_URL:         http://rules-engine:3201
      AI_GATEWAY_URL:           http://ai-gateway:3200
      AUTH_API_URL:             http://auth-api:3200
      EVALUATION_API_URL:       http://evaluation-api:3400
      CHANNEL_GATEWAY_WS_URL:   ws://channel-gateway:8010
      CHANNEL_GATEWAY_HTTP_URL: http://channel-gateway:8010
      WORKFLOW_API_URL:         http://workflow-api:3800
      CALENDAR_API_URL:         http://calendar-api:3700
      ANALYTICS_API_URL:        http://analytics-api:3500
      REDIS_URL:                redis://redis:6379
      KAFKA_BROKERS:            kafka:29092
      TENANT_ID:                tenant_demo
      JWT_SECRET:               demo_plughub_secret_32chars__
      AUTH_JWT_SECRET:          changeme_auth_jwt_secret_demo_32c
      AUTH_ADMIN_TOKEN:         changeme_auth_admin_token_demo
      EVAL_ADMIN_TOKEN:         changeme_eval_admin_token_demo
      E2E_REPORT_PATH:          /app/e2e-report.json
      # E2E_EXTRA_ARGS exemplos:
      #   --demo           cenários 01–14 (padrão)
      #   --evaluation     Arc 6: cenários 01–04 + 24 + 25
      #   --permissions    Arc 6 v2: cenário 27
      #   --hooks          Arc 5 hooks: cenário 22
      #   --segments       Arc 5 segments: cenário 23
      #   --conference, --webchat, --workflow, --collect, --ctx
      E2E_EXTRA_ARGS:           ${E2E_EXTRA_ARGS:---demo}
    depends_on:
      mcp-server-plughub:
        condition: service_healthy
      agent-registry:
        condition: service_healthy
      routing-engine:
        condition: service_healthy
      skill-flow-service:
        condition: service_healthy
      rules-engine:
        condition: service_healthy
      channel-gateway:
        condition: service_healthy
      workflow-api:
        condition: service_healthy
      analytics-api:
        condition: service_healthy
      evaluation-api:
        condition: service_healthy
      auth-api:
        condition: service_healthy
    networks:
      - plughub-demo
    restart: "no"
