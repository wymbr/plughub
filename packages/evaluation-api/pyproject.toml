[project]
name            = "plughub-evaluation-api"
version         = "1.0.0"
description     = "PlugHub Platform — Evaluation API (Arc 6 quality evaluation platform)"
requires-python = ">=3.10"
dependencies    = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "asyncpg>=0.29.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "httpx>=0.27.0",
    "aiokafka>=0.11.0",
    "redis>=5.0.0",
    "PyJWT>=2.8.0",
]

[project.scripts]
plughub-evaluation-api = "plughub_evaluation_api.main:run"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["src/plughub_evaluation_api/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/plughub_evaluation_api"]
