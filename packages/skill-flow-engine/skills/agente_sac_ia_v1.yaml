# agente_sac_ia_v1.yaml
# SAC IA — Agente LLM de Atendimento ao Cliente

id: skill_sac_ia_v1
name: "SAC IA v1 — Atendimento LLM"
version: "1.0"
description: "Agente LLM de atendimento SAC com escalada para retenção humano."
classification:
  type: orchestrator
  domain: customer_service
#
# Pool: sac_ia
# Escalada para: retencao_humano
#
# Fluxo:
#   1. saudacao           — notify: boas-vindas
#   2. aguardar_mensagem  — menu: aguarda mensagem do cliente (loop de N turnos)
#   3. analisar           — reason: analisa intenção, sentimento e decide se escala
#                           output: { resposta, escalar, sentimento }
#   4. verificar_escalada — choice: escalar == true → acumular_contexto | false → responder
#   5. responder          — notify: entrega resposta gerada pelo Claude
#      (loop: responder → aguardar_mensagem)
#
#   — caminho de escalada —
#   6. acumular_contexto  — task assist: agente_contexto_ia_v1 enriquece contact_context
#                           APENAS quando a escalada já foi decidida.
#                           O especialista avalia o que precisa coletar, busca CRM
#                           e coleta do cliente só o que genuinamente falta — tudo
#                           antes de passar o bastão ao agente humano.
#   7. avisar_escalada    — notify: informa transferência para especialista
#   8. escalar            — escalate → pool retencao_humano
#                           pipeline_state (com contact_context completo) é passado
#                           integralmente ao agente humano — sem re-perguntas.
#   9. finalizar          — complete outcome: resolved (sem escalada) ou escalated_human
#
# Critérios de escalada automática (avaliados pelo step reason):
#   - sentimento negativo intenso (frustração, raiva)
#   - cliente solicita explicitamente falar com humano
#   - problema técnico que exige ação em sistema de backend (fatura, débito, cancelamento)
#   - terceira mensagem consecutiva sem resolução
#
# Timeout por inatividade: 5 minutos (timeout_s: 300).

entry: saudacao

steps:

  # ── Etapa 1: saudação inicial ─────────────────────────────────────────────
  - id: saudacao
    type: notify
    message: "Olá! Sou o assistente virtual do SAC. Estou aqui para ajudar você. Como posso te atender hoje?"
    channel: session
    on_success: aguardar_mensagem
    on_failure: aguardar_mensagem

  # ── Etapa 2: aguardar mensagem do cliente (loop principal) ────────────────
  # O cliente fala livremente. Nenhum dado de identificação é solicitado aqui —
  # isso só acontece se a conversa precisar ser escalada para um humano.
  - id: aguardar_mensagem
    type: menu
    prompt: "Pode enviar sua mensagem sempre que quiser."
    interaction: text
    output_as: ultima_mensagem
    timeout_s: 300
    on_success: analisar
    on_failure: finalizar
    on_timeout: finalizar
    on_disconnect: finalizar

  # ── Etapa 3: analisar mensagem com IA ────────────────────────────────────
  # Decide se responde ou escala. Escreve os outputs diretamente no ContextStore:
  #   @ctx.session.ultima_resposta     — resposta para o cliente (interpolada em responder)
  #   @ctx.session.escalar_solicitado  — flag de escalada (avaliada em verificar_escalada)
  #   @ctx.session.sentimento_atual    — sentimento detectado (lido pelo Agent Assist UI)
  #   @ctx.session.historico_mensagens — histórico acumulado de turnos (persistido entre loops)
  # @ctx.caller.* são lidos do ContextStore para personalizar a resposta sem
  # depender de pipeline_state (disponíveis via insight ou acumulação prévia).
  - id: analisar
    type: reason
    prompt_id: sac_ia_turn_analysis_v1
    input:
      instrucoes: |
        Você é um assistente virtual de SAC (Serviço de Atendimento ao Cliente) de uma empresa de telecomunicações.
        Analise a mensagem do cliente e forneça:
        1. Uma resposta clara e empática em português
        2. Se deve escalar para um atendente humano (true/false)
        3. O sentimento detectado na mensagem
        4. O historico_mensagens atualizado: concatene historico_anterior (se houver)
           com a nova mensagem no formato "Cliente: <mensagem>\n". Este histórico
           será usado pelo agente de contexto se a conversa for escalada.

        Contexto disponível sobre o cliente (use para personalizar a resposta):
        - Se o nome do cliente está disponível, use-o na resposta
        - Se o motivo_contato já foi identificado, não peça novamente
        - Se há histórico de tentativas de resolução, leve em conta ao formular a resposta

        Escale para humano quando:
        - O cliente expressa frustração intensa ou raiva
        - O cliente pede explicitamente para falar com uma pessoa
        - O problema requer acesso a sistemas internos (fatura, débito, cancelamento)
        - A situação é urgente (serviço cortado, emergência)
        - O motivo_contato indica cancelamento, portabilidade ou disputa de cobrança

        Não escale para humano quando:
        - É uma dúvida informacional simples
        - É uma reclamação amena que pode ser acolhida com empatia
        - O cliente só quer confirmar informações

        Responda de forma breve e direta (2 a 4 frases).
      mensagem_cliente:   "$.pipeline_state.ultima_mensagem"
      historico_anterior: "@ctx.session.historico_mensagens"
      nome_cliente:       "@ctx.caller.nome"
      motivo_contato:     "@ctx.caller.motivo_contato"
    context_tags:
      outputs:
        resposta:
          tag: session.ultima_resposta
          confidence: 1.0
          merge: overwrite
        escalar:
          tag: session.escalar_solicitado
          confidence: 1.0
          merge: overwrite
        sentimento:
          tag: caller.sentimento_atual
          confidence: 0.80
          merge: overwrite
        historico_mensagens:
          tag: session.historico_mensagens
          confidence: 1.0
          merge: overwrite
    output_schema:
      resposta:
        type: string
      escalar:
        type: boolean
      sentimento:
        type: string
        enum:
          - positivo
          - neutro
          - negativo
      historico_mensagens:
        type: string
        description: "Histórico acumulado de todas as mensagens do cliente nesta sessão"
    output_as: analise
    on_success: verificar_escalada
    on_failure: aguardar_mensagem

  # ── Etapa 4: verificar se deve escalar ───────────────────────────────────
  # Lê @ctx.session.escalar_solicitado — escrito no step analisar via context_tags.
  # true → coletar contexto completo antes de transferir para humano.
  - id: verificar_escalada
    type: choice
    conditions:
      - field: "@ctx.session.escalar_solicitado"
        operator: eq
        value: true
        next: acumular_contexto
    default: responder

  # ── Etapa 5: responder ao cliente e voltar ao loop ────────────────────────
  # @ctx.session.ultima_resposta foi escrito pelo step analisar via context_tags.
  - id: responder
    type: notify
    message: "{{@ctx.session.ultima_resposta}}"
    channel: session
    on_success: aguardar_mensagem
    on_failure: aguardar_mensagem

  # ── Etapa 6: acumulação de contexto PRÉ-ESCALADA ─────────────────────────
  # Chamado SOMENTE quando a escalada já foi decidida pelo step analisar.
  # O agente_contexto_ia_v1 avalia o que já sabemos, busca o CRM se possível,
  # e coleta do cliente apenas o que genuinamente falta para o agente humano
  # atender sem precisar perguntar novamente (nome, CPF, número de conta, etc.).
  # O resultado fica em pipeline_state.contact_context e é passado integralmente
  # ao agente humano via context: pipeline_state no step escalar.
  - id: acumular_contexto
    type: task
    target:
      skill_id: agente_contexto_ia_v1
    mode: assist
    execution_mode: sync
    on_success: avisar_escalada
    on_failure: avisar_escalada   # nunca bloquear a escalada

  # ── Etapa 7: avisar sobre transferência para especialista ─────────────────
  - id: avisar_escalada
    type: notify
    message: "Entendi sua situação. Para melhor atendê-lo, vou transferi-lo agora para um dos nossos especialistas. Aguarde um instante, por favor."
    channel: session
    on_success: escalar
    on_failure: escalar

  # ── Etapa 8: escalar para pool de atendimento humano ─────────────────────
  # O pipeline_state (incluindo contact_context enriquecido) é passado integralmente
  # ao agente humano — sem re-perguntas ao cliente.
  - id: escalar
    type: escalate
    target:
      pool: retencao_humano
    context: pipeline_state
    error_reason: escalated_to_human

  # ── Etapa 9: finalizar sem escalada (timeout ou resolução direta) ─────────
  - id: finalizar
    type: complete
    outcome: resolved
