# agente_contexto_ia_v1.yaml — v2 — ContextStore-native
# Agente de Acumulação de Contexto — Context-Aware Progressive Resolution

id: skill_contexto_ia_v1
name: "Contexto IA v1 — Context-Aware Progressive Resolution"
version: "1.0"
description: "Acumula contexto do cliente no ContextStore antes do atendimento principal. Zero LLM calls quando CRM resolve; máx 2 LLM calls."
classification:
  type: orchestrator
  domain: customer_service
#
# Pool: contexto_ia (role: specialist — sem tráfego direto de clientes)
# Invocado via: task step (mode: assist) por qualquer agente especialista
#
# Responsabilidade:
#   Garantir que as tags de contexto essenciais do cliente estejam no ContextStore
#   antes que o agente invocador execute sua lógica de negócio.
#   Evita re-coletar dados já presentes com confiança suficiente.
#
# Fluxo (v2 — ContextStore-native):
#   1. verificar_gaps      — choice @ctx.*: verifica se caller.customer_id ou
#                            caller.cpf disponíveis → desvio para CRM
#   2. verificar_completude — choice @ctx.*: verifica se motivo_contato presente
#                             com confiança ≥ 0.7 → done
#   3. buscar_crm          — invoke: mcp-server-crm customer_get + context_tags
#                            auto-escrevem nome, cpf, account_id etc. no store
#   4. gerar_pergunta      — reason (LLM call #1): gera pergunta consolidada,
#                            escreve em @ctx.session.pergunta_coleta
#   5. coletar_cliente     — menu: coleta resposta livre do cliente
#   6. extrair_campos      — reason (LLM call #2): extrai campos estruturados,
#                            context_tags auto-escrevem no ContextStore
#   7. finalizar           — complete: done
#
# Vantagem v2 vs v1:
#   - Sem step "avaliar_contexto" (LLM desnecessário para detectar gaps)
#   - Sem step "montar_contexto" (ContextStore acumula automaticamente)
#   - Sem step "confirmar_incertos" (confiança suficiente = aceito sem confirmação)
#   - 0 LLM calls no caminho feliz (customer_id presente → CRM → completo)
#   - 1 LLM call quando só precisa de motivo_contato (gerar_pergunta)
#   - 2 LLM calls no pior caso (gerar_pergunta + extrair_campos)
#
# Threshold de confiança:
#   ≥ 0.8 → aceito sem confirmação
#   0.4–0.8 → aceito para raciocínio, mas marcado como low_confidence
#   < 0.4 → coletar novamente

required_context:
  - tag: caller.nome
    confidence_min: 0.8
  - tag: caller.motivo_contato
    confidence_min: 0.7
  - tag: caller.intencao_primaria
    confidence_min: 0.7
    required: false   # Desejável mas não bloqueante — skill progride sem ele

entry: verificar_gaps

steps:

  # ── Step 1: verificar se temos identificadores para buscar CRM ───────────────
  # Usa @ctx.* conditions — zero LLM, zero network (~0ms).
  # Se customer_id ou cpf disponíveis → CRM é mais rápido que perguntar ao cliente.
  # Caso contrário → verificar se o contexto já está completo de outra fonte.
  - id: verificar_gaps
    type: choice
    conditions:
      # customer_id presente → ir direto ao CRM (caminho mais rápido)
      - field: "@ctx.caller.customer_id"
        operator: exists
        next: buscar_crm
      # cpf presente mas sem customer_id → CRM via cpf
      - field: "@ctx.caller.cpf"
        operator: exists
        next: buscar_crm
    default: verificar_completude

  # ── Step 1b: verificar se o contexto mínimo já está disponível ───────────────
  # Executado quando não há customer_id/cpf — verifica se motivo_contato
  # já está presente de outra fonte (pipeline_state herdado, insight etc.)
  - id: verificar_completude
    type: choice
    conditions:
      - field: "@ctx.caller.motivo_contato"
        operator: confidence_gte
        value: 0.7
        next: finalizar
    default: gerar_pergunta

  # ── Step 2: buscar dados no CRM ──────────────────────────────────────────────
  # context_tags.outputs auto-escrevem os campos retornados no ContextStore.
  # Não precisa de "montar_contexto" — a acumulação é automática.
  # Também complementa o McpInterceptor se este não tiver a anotação registrada.
  - id: buscar_crm
    type: invoke
    target:
      mcp_server: mcp-server-crm
      tool: customer_get
    input:
      customer_id: "@ctx.caller.customer_id"
    context_tags:
      inputs:
        customer_id:
          tag: caller.customer_id
          confidence: 0.90
      outputs:
        nome:
          tag: caller.nome
          confidence: 0.95
          merge: highest_confidence
        cpf:
          tag: caller.cpf
          confidence: 0.95
          merge: highest_confidence
        account_id:
          tag: caller.account_id
          confidence: 0.95
          merge: highest_confidence
        telefone:
          tag: caller.telefone
          confidence: 0.95
          merge: highest_confidence
        email:
          tag: caller.email
          confidence: 0.95
          merge: highest_confidence
        plano_atual:
          tag: account.plano_atual
          confidence: 0.95
          merge: overwrite
        status_conta:
          tag: account.status
          confidence: 0.95
          merge: overwrite
    output_as: dados_crm_raw
    on_success: verificar_completude   # re-checar — CRM pode ter completado o contexto
    on_failure: gerar_pergunta         # CRM indisponível → coletar do cliente

  # ── Step 3: gerar pergunta consolidada (LLM call #1) ─────────────────────────
  # Constrói uma única pergunta natural cobrindo todos os gaps.
  # context_tags escreve a pergunta gerada em @ctx.session.pergunta_coleta
  # para ser interpolada no menu step seguinte.
  - id: gerar_pergunta
    type: reason
    prompt_id: contexto_gerar_pergunta_v2
    input:
      instrucoes: |
        Gere uma única pergunta natural e cordial em português que colete
        os dados essenciais para o atendimento.

        Princípios:
        - Verifique o historico_conversa: se o cliente já mencionou CPF,
          nome ou qualquer outro dado relevante em mensagens anteriores,
          NÃO peça novamente — extraia diretamente do histórico.
        - Nunca liste os campos como um formulário
        - Integre em uma frase conversacional natural
        - Máximo 2 informações por pergunta
        - Tom empático e profissional
        - Se já sabe o nome → use-o na pergunta

        Exemplos bons:
          "Para agilizar seu atendimento, pode me confirmar seu CPF e
          descrever o que está acontecendo?"
          "Pode me dizer o que precisa hoje?"

        Exemplos ruins:
          "Por favor, informe: 1) CPF 2) Conta 3) Motivo do contato"
      historico:       "@ctx.session.historico_mensagens"
      ultima_mensagem: "$.pipeline_state.ultima_mensagem"
      nome_cliente:    "@ctx.caller.nome"
    context_tags:
      outputs:
        pergunta:
          tag: session.pergunta_coleta
          confidence: 1.0
          merge: overwrite
    output_schema:
      pergunta:
        type: string
    output_as: pergunta_gerada
    on_success: coletar_cliente
    on_failure: coletar_cliente_fallback

  # ── Step 4a: coleta com pergunta gerada por IA ────────────────────────────────
  - id: coletar_cliente
    type: menu
    prompt: "{{@ctx.session.pergunta_coleta}}"
    interaction: text
    output_as: resposta_cliente
    timeout_s: 180
    on_success: extrair_campos
    on_failure: finalizar_parcial
    on_timeout: finalizar_parcial
    on_disconnect: finalizar_parcial

  # ── Step 4b: fallback com pergunta padrão ─────────────────────────────────────
  - id: coletar_cliente_fallback
    type: menu
    prompt: "Para melhor atendê-lo, pode me informar seu CPF e descrever o que precisa?"
    interaction: text
    output_as: resposta_cliente
    timeout_s: 180
    on_success: extrair_campos
    on_failure: finalizar_parcial
    on_timeout: finalizar_parcial
    on_disconnect: finalizar_parcial

  # ── Step 5: extrair campos estruturados (LLM call #2) ────────────────────────
  # context_tags.outputs auto-escrevem os campos extraídos no ContextStore.
  # merge: highest_confidence garante que dados de alta confiança existentes
  # não sejam sobrescritos por extrações menos certas.
  - id: extrair_campos
    type: reason
    prompt_id: contexto_extracao_v2
    input:
      instrucoes: |
        O cliente respondeu à pergunta de coleta. Extraia todos os campos
        identificáveis da resposta. Retorne apenas os campos que estiverem
        presentes na resposta (omita campos ausentes — não retorne null).

        Para motivo_contato, use um destes valores canônicos:
          cancelamento_plano | falha_servico | duvida_fatura | mudanca_plano |
          suporte_tecnico | reclamacao | informacao_geral

        Para intencao_primaria, seja mais específico que motivo_contato.
        Para sentimento_atual: positivo | neutro | frustrado | irritado | urgente
      resposta: "$.pipeline_state.resposta_cliente"
    context_tags:
      outputs:
        cpf:
          tag: caller.cpf
          confidence: 0.85
          merge: highest_confidence
        nome:
          tag: caller.nome
          confidence: 0.85
          merge: highest_confidence
        customer_id:
          tag: caller.customer_id
          confidence: 0.80
          merge: highest_confidence
        account_id:
          tag: caller.account_id
          confidence: 0.80
          merge: highest_confidence
        telefone:
          tag: caller.telefone
          confidence: 0.80
          merge: highest_confidence
        motivo_contato:
          tag: caller.motivo_contato
          confidence: 0.80
          merge: highest_confidence
        intencao_primaria:
          tag: caller.intencao_primaria
          confidence: 0.75
          merge: highest_confidence
        sentimento_atual:
          tag: caller.sentimento_atual
          confidence: 0.70
          merge: highest_confidence
    output_schema:
      cpf:
        type: string
        required: false
      nome:
        type: string
        required: false
      customer_id:
        type: string
        required: false
      account_id:
        type: string
        required: false
      telefone:
        type: string
        required: false
      motivo_contato:
        type: string
        required: false
        enum:
          - cancelamento_plano
          - falha_servico
          - duvida_fatura
          - mudanca_plano
          - suporte_tecnico
          - reclamacao
          - informacao_geral
      intencao_primaria:
        type: string
        required: false
      sentimento_atual:
        type: string
        required: false
        enum:
          - positivo
          - neutro
          - frustrado
          - irritado
          - urgente
    output_as: extracao
    on_success: finalizar
    on_failure: finalizar_parcial

  # ── Complete: contexto enriquecido disponível no ContextStore ─────────────────
  - id: finalizar
    type: complete
    outcome: resolved

  # ── Fallback: nunca bloqueia o fluxo principal ────────────────────────────────
  # O agente invocador continua mesmo se o contexto estiver incompleto.
  - id: finalizar_parcial
    type: complete
    outcome: resolved
