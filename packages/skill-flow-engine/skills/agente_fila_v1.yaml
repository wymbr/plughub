# agente_fila_v1.yaml
# Queue Agent — Queue Agent Pattern (spec: Queue Agent)
#
# Ativado pelo Orchestrator Bridge quando um contato entra em fila e o pool
# está configurado com queue_config.agent_type_id.
#
# Fluxo:
#   1. boas_vindas          — notifica o cliente que está em fila
#   2. aguardar_mensagem    — menu text timeout_s:0, aguarda mensagem do cliente ou
#                             sinal '__agent_available__' injetado via LPUSH pelo
#                             kafka_listener drain quando agente humano fica disponível
#   3. verificar_sinal      — choice: sinal → avisar_transferencia | mensagem → responder_cliente
#   4. responder_cliente    — reason: gera resposta empática usando input contextual
#   5. enviar_resposta      — notify: entrega a resposta ao cliente
#   (loop: enviar_resposta → aguardar_mensagem)
#   6. avisar_transferencia — notify: informa que o agente humano está disponível
#   7. escalar              — invoke conversation_escalate → target_pool via $.session.pool_id
#   8. finalizar            — complete outcome: escalated_human
#
# Contexto de sessão exposto pelo Orchestrator Bridge (extra_context):
#   $.session.pool_id     — pool de destino para a escalada final
#   $.session.session_id  — ID da sessão corrente
#
# Para usar este fluxo em um pool:
#   1. Configure queue_config.agent_type_id no pool com o valor "agente_fila_v1"
#   2. O Orchestrator Bridge carregará este YAML como fallback de dev automaticamente

entry: boas_vindas

steps:

  # ── Etapa 1: boas-vindas ─────────────────────────────────────────────────
  - id: boas_vindas
    type: notify
    message: "Olá! No momento todos os nossos especialistas estão ocupados. Você está na fila de atendimento e será atendido em breve. Enquanto aguarda, pode enviar mensagens — vou te acompanhar."
    channel: session
    on_success: aguardar_mensagem
    on_failure: aguardar_mensagem

  # ── Etapa 2: aguardar mensagem ou sinal de disponibilidade ────────────────
  # timeout_s: 0 → aguarda indefinidamente até que:
  #   a) o cliente envie uma mensagem  — kafka_listener faz LPUSH menu:result:{session_id}
  #   b) agente humano disponível      — kafka_listener faz LPUSH menu:result:{session_id}
  #                                      com valor "__agent_available__"
  #   c) cliente desconecta            — bridge faz LPUSH session:closed:{session_id}
  # O prompt é exibido somente quando necessário (looping após resposta anterior).
  - id: aguardar_mensagem
    type: menu
    prompt: "Se tiver mais alguma dúvida, pode enviar sua mensagem."
    interaction: text
    output_as: ultima_mensagem
    timeout_s: 0
    on_success: verificar_sinal
    on_failure: finalizar
    on_timeout: finalizar
    on_disconnect: finalizar

  # ── Etapa 3: verificar se é sinal de disponibilidade ou mensagem real ─────
  - id: verificar_sinal
    type: choice
    conditions:
      - field: "$.pipeline_state.ultima_mensagem"
        operator: eq
        value: "__agent_available__"
        next: avisar_transferencia
    default: responder_cliente

  # ── Etapa 4: gerar resposta para a mensagem do cliente com IA ─────────────
  # Usa prompt_id como identificador de auditoria; o conteúdo real é passado
  # via input (instrucoes + mensagem_cliente) e visto pelo ReasonEngine como JSON.
  - id: responder_cliente
    type: reason
    prompt_id: queue_agent_response_v1
    input:
      instrucoes: "O cliente está aguardando atendimento humano na fila. Responda de forma amigável e empática em português. Confirme o recebimento da mensagem. Se o assunto for simples de esclarecer brevemente, faça isso. Tranquilize o cliente sobre o tempo de espera. Informe que um especialista atenderá em breve. Seja breve (2 a 3 frases). Não resolva problemas complexos — apenas acolha e mantenha o cliente informado."
      mensagem_cliente: "$.pipeline_state.ultima_mensagem"
    output_schema:
      resposta:
        type: string
    output_as: resposta_ia
    on_success: enviar_resposta
    on_failure: aguardar_mensagem

  # ── Etapa 5: entregar resposta ao cliente e voltar ao loop ────────────────
  - id: enviar_resposta
    type: notify
    message: "{{$.pipeline_state.resposta_ia.resposta}}"
    channel: session
    on_success: aguardar_mensagem
    on_failure: aguardar_mensagem

  # ── Etapa 6: avisar o cliente que o agente humano está disponível ─────────
  - id: avisar_transferencia
    type: notify
    message: "Ótima notícia! Um de nossos especialistas está disponível agora. Vou transferir você imediatamente. Aguarde um instante..."
    channel: session
    on_success: escalar
    on_failure: escalar

  # ── Etapa 7: escalar para o pool humano ───────────────────────────────────
  # Usa invoke para chamar conversation_escalate com target_pool resolvido
  # dinamicamente de $.session.pool_id (injetado pelo Orchestrator Bridge via
  # extra_context ao ativar o agente de fila com process_queued).
  - id: escalar
    type: invoke
    tool: conversation_escalate
    input:
      session_id: "$.session.session_id"
      target_pool: "$.session.pool_id"
    on_success: finalizar
    on_failure: finalizar

  # ── Etapa 8: finalizar ────────────────────────────────────────────────────
  - id: finalizar
    type: complete
    outcome: escalated_human
