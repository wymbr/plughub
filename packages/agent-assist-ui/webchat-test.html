<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>WebChat — Cliente de Teste</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f0f4f8; height: 100vh; display: flex; align-items: center;
         justify-content: center; }
  .chat { width: 420px; height: 640px; background: white; border-radius: 16px;
          box-shadow: 0 8px 32px rgba(0,0,0,.12); display: flex; flex-direction: column;
          overflow: hidden; }
  .header { background: #4f46e5; color: white; padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 15px; font-weight: 600; }
  .status { font-size: 11px; opacity: .8; margin-top: 2px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
         background: #fbbf24; margin-right: 5px; }
  .dot.ok { background: #34d399; }
  .dot.err { background: #f87171; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex;
              flex-direction: column; gap: 8px; }
  .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px;
         font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg.in  { background: #f1f5f9; color: #1e293b; align-self: flex-start;
             border-bottom-left-radius: 4px; }
  .msg.out { background: #4f46e5; color: white; align-self: flex-end;
             border-bottom-right-radius: 4px; }
  .msg.sys { background: #fef3c7; color: #92400e; align-self: center;
             font-size: 11px; border-radius: 8px; padding: 4px 10px; }
  .label { font-size: 10px; color: #94a3b8; margin-bottom: 2px; }
  .label.right { text-align: right; }
  .input-row { display: flex; padding: 12px; border-top: 1px solid #e2e8f0; gap: 8px; }
  textarea { flex: 1; border: 1px solid #d1d5db; border-radius: 10px;
             padding: 8px 12px; font-size: 13px; resize: none; outline: none;
             font-family: inherit; }
  textarea:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,.2); }
  button { background: #4f46e5; color: white; border: none; border-radius: 10px;
           padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; }
  button:hover { background: #4338ca; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .config-row { padding: 8px 12px; border-top: 1px solid #e2e8f0;
                display: flex; gap: 6px; align-items: center; }
  .config-row select, .config-row input {
    border: 1px solid #d1d5db; border-radius: 8px;
    padding: 6px 10px; font-size: 12px; outline: none; background: white; }
  .config-row select { width: 130px; }
  .config-row input { flex: 1; }
  .config-row button { padding: 6px 14px; font-size: 12px; background: #0ea5e9; flex-shrink: 0; }
  .config-row button:hover { background: #0284c7; }
  .err-detail { font-size: 10px; color: #ef4444; padding: 2px 12px 4px; display: none; }
  /* ── Interaction cards ── */
  .ia-card { background: #f1f5f9; border-radius: 12px; padding: 10px 12px;
             align-self: flex-start; max-width: 85%; border-bottom-left-radius: 4px;
             font-size: 13px; line-height: 1.5; }
  .ia-card.done { opacity: .5; pointer-events: none; }
  .ia-sender { font-size: 11px; font-weight: 600; color: #4f46e5; margin-bottom: 4px; }
  .ia-badge { font-size: 10px; background: #e0e7ff; color: #4338ca;
              border-radius: 4px; padding: 1px 5px; margin-left: 5px; vertical-align: middle; }
  .ia-prompt { margin-bottom: 8px; color: #1e293b; }
  .ia-opt-btn { display: block; width: 100%; margin: 3px 0; padding: 6px 10px;
                background: white; color: #1e293b; border: 1px solid #cbd5e1;
                border-radius: 6px; cursor: pointer; text-align: left; font-size: 13px; }
  .ia-opt-btn:hover { background: #e0e7ff; border-color: #4f46e5; }
  .ia-row { display: flex; gap: 6px; margin-top: 4px; }
  .ia-row input { flex: 1; padding: 6px 10px; border-radius: 6px; font-size: 13px;
                  border: 1px solid #cbd5e1; outline: none; }
  .ia-row input:focus { border-color: #4f46e5; }
  .ia-row input.masked { border-color: #f59e0b; }
  .ia-row .ok-btn { padding: 6px 12px; font-size: 13px; border-radius: 6px; flex-shrink: 0; }
  .ia-field { margin-bottom: 8px; }
  .ia-field label { display: flex; align-items: center; gap: 4px;
                    font-size: 11px; color: #64748b; margin-bottom: 3px; }
  .ia-field input { width: 100%; padding: 6px 10px; border-radius: 6px; font-size: 13px;
                    border: 1px solid #cbd5e1; outline: none; box-sizing: border-box; }
  .ia-field input:focus { border-color: #4f46e5; }
  .ia-field input.masked { border-color: #f59e0b; background: #fffbeb; }
  .ia-field-tooltip { font-size: 10px; color: #94a3b8; cursor: help; }
  .ia-submit { width: 100%; margin-top: 8px; padding: 8px 12px; font-size: 13px;
               border-radius: 6px; background: #4f46e5; color: white; border: none;
               cursor: pointer; font-weight: 500; }
  .ia-submit:hover { background: #4338ca; }
  .ia-hint { font-size: 11px; color: #b45309; margin-top: 4px; }
  /* ── Submitted form state ── */
  .ia-submitted-banner { font-size: 11px; color: #16a34a; font-weight: 600;
                         margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
  .ia-field-done { display: flex; justify-content: space-between; align-items: center;
                   padding: 4px 0; border-bottom: 1px solid #e2e8f0; font-size: 12px; }
  .ia-field-done:last-child { border-bottom: none; }
  .ia-field-done-label { color: #64748b; }
  .ia-field-done-value { color: #1e293b; font-weight: 500; }
  .ia-field-done-value.masked-done { color: #b45309; letter-spacing: 1px; }
  .ia-check { display: flex; align-items: center; gap: 8px; margin-bottom: 5px;
              cursor: pointer; font-size: 13px; color: #1e293b; }
  .ia-check input[type=checkbox] { width: 14px; height: 14px; accent-color: #4f46e5; cursor: pointer; }
</style>
</head>
<body>
<div class="chat">
  <div class="header">
    <div>
      <h1>PlugHub WebChat</h1>
      <div class="status"><span class="dot" id="dot"></span><span id="status-text">Desconectado</span></div>
    </div>
    <div style="font-size:11px;opacity:.7" id="session-label"></div>
  </div>

  <!-- Pool + connect row -->
  <div class="config-row">
    <select id="pool-select">
      <option value="sac_ia">sac_ia</option>
      <option value="demo_ia">demo_ia</option>
      <option value="fila_humano">fila_humano</option>
      <option value="retencao_humano">retencao_humano</option>
      <option value="auth_ia">auth_ia (PIN mascarado)</option>
      <option value="auth_form_ia">auth_form_ia (formulário masked)</option>
      <option value="copilot_sac">copilot_sac (@mention co-pilot)</option>
    </select>
    <input id="token-input" placeholder="JWT (auto-gerado se vazio)" />
    <button id="connect-btn" onclick="connect().catch(onConnectErr)">Conectar</button>
  </div>
  <div class="err-detail" id="err-detail"></div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <textarea id="msg-input" rows="2" placeholder="Digite sua mensagem… (Enter envia)"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
    <button id="send-btn" onclick="send()" disabled>Enviar</button>
  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  const WS_BASE    = 'ws://localhost:8010/ws/chat';   // + /{pool_id}
  const JWT_SECRET = 'changeme_32chars_webchat_secret!';
  const TENANT_ID  = 'tenant_demo';

  let ws        = null;
  let sessionId = null;
  let connected = false;

  // ── JWT HS256 via Web Crypto API ────────────────────────────────────────────
  function b64url(bytes) {
    // accepts Uint8Array or string
    const bin = typeof bytes === 'string' ? bytes
      : String.fromCharCode(...bytes);
    return btoa(bin).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
  }
  async function makeJWT(payload) {
    const enc    = new TextEncoder();
    const header = b64url(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
    const body   = b64url(JSON.stringify(payload));
    const input  = header + '.' + body;
    const key    = await crypto.subtle.importKey(
      'raw', enc.encode(JWT_SECRET),
      { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
    );
    const sig    = new Uint8Array(await crypto.subtle.sign('HMAC', key, enc.encode(input)));
    return input + '.' + b64url(sig);
  }

  // ── UI helpers ──────────────────────────────────────────────────────────────
  function setStatus(label, state) {
    document.getElementById('status-text').textContent = label;
    const dot = document.getElementById('dot');
    dot.className = 'dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
    const btn = document.getElementById('connect-btn');
    if (state === 'ok') {
      btn.textContent = 'Nova sessão';
      btn.style.background = '#059669';
      btn.title = 'Encerra este contato e abre um novo';
    } else {
      btn.textContent = 'Conectar';
      btn.style.background = '';
      btn.title = '';
    }
  }
  function showErr(msg) {
    const el = document.getElementById('err-detail');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }
  function addMsg(text, dir, label) {
    const msgs = document.getElementById('messages');
    if (label) {
      const l = document.createElement('div');
      l.className = 'label' + (dir === 'out' ? ' right' : '');
      l.textContent = label;
      msgs.appendChild(l);
    }
    const d = document.createElement('div');
    d.className = 'msg ' + dir;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function onConnectErr(e) {
    console.error(e);
    setStatus('Erro JWT', 'err');
    showErr(String(e));
  }

  // ── Connect ─────────────────────────────────────────────────────────────────
  async function connect() {
    if (ws) { ws.close(); ws = null; connected = false; }
    // Clear token so a new contact_id is generated for each new session
    document.getElementById('token-input').value = '';
    document.getElementById('send-btn').disabled = true;
    document.getElementById('messages').innerHTML = '';
    document.getElementById('session-label').textContent = '';
    showErr('');
    setStatus('Conectando…', '');

    const poolId = document.getElementById('pool-select').value;
    let token    = document.getElementById('token-input').value.trim();

    if (!token) {
      const now = Math.floor(Date.now() / 1000);
      token = await makeJWT({
        sub:       'cliente-demo-' + Date.now(),
        tenant_id: TENANT_ID,
        channel:   'webchat',
        iat:       now,
        exp:       now + 3600,
      });
      document.getElementById('token-input').value = token;
    }

    const url = `${WS_BASE}/${poolId}`;
    console.log('[webchat] connecting to', url);
    ws = new WebSocket(url);

    ws.onopen = () => {
      setStatus('Aguardando handshake…', '');
      console.log('[webchat] WS open');
    };

    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      console.log('[webchat] ←', msg);

      if (msg.type === 'conn.hello') {
        ws.send(JSON.stringify({ type: 'conn.authenticate', token }));
        return;
      }
      if (msg.type === 'conn.authenticated') {
        sessionId = msg.session_id;
        connected = true;
        setStatus('Conectado', 'ok');
        document.getElementById('session-label').textContent =
          sessionId ? sessionId.slice(0,8)+'…' : '';
        document.getElementById('send-btn').disabled = false;
        addMsg('Conectado ao suporte. Aguardando agente…', 'sys');
        return;
      }
      if (msg.type === 'conn.error') {
        const detail = msg.message || msg.code || JSON.stringify(msg);
        setStatus('Erro auth', 'err');
        showErr('conn.error: ' + detail);
        addMsg('Erro: ' + detail, 'sys');
        return;
      }
      if (msg.type === 'msg.text') {
        const isAgent = msg.author && msg.author.type !== 'customer';
        addMsg(msg.text || msg.content || '',
               isAgent ? 'in' : 'out',
               isAgent ? (msg.author.name || 'Agente') : null);
        return;
      }
      if (msg.type === 'presence.agent_joined') {
        addMsg('Agente entrou no atendimento', 'sys');
        return;
      }
      if (msg.type === 'conn.session_ended') {
        setStatus('Sessão encerrada', 'err');
        addMsg('Atendimento encerrado.', 'sys');
        document.getElementById('send-btn').disabled = true;
        connected = false;
        return;
      }
      if (msg.type === 'interaction.request') {
        renderInteraction(msg);
        return;
      }
    };

    ws.onerror = (e) => {
      console.error('[webchat] WS error', e);
      setStatus('Erro de conexão', 'err');
      showErr('Verifique se o channel-gateway está rodando em localhost:8010');
    };
    ws.onclose = (e) => {
      console.log('[webchat] WS closed', e.code, e.reason);
      if (connected) {
        setStatus('Sessão encerrada', 'err');
        connected = false;
        addMsg('Atendimento encerrado.', 'sys');
        document.getElementById('send-btn').disabled = true;
      }
    };
  }

  // ── Send message ────────────────────────────────────────────────────────────
  function send() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    const envelope = { type: 'msg.text', id: 'msg-' + Date.now(), text };
    console.log('[webchat] →', envelope);
    ws.send(JSON.stringify(envelope));
    addMsg(text, 'out', 'Você');
    input.value = '';
    input.focus();
  }

  // ── Interaction rendering ────────────────────────────────────────────────────
  function renderInteraction(msg) {
    const msgs = document.getElementById('messages');

    const card = document.createElement('div');
    card.className = 'ia-card';
    card.id = 'ia-' + msg.menu_id;

    let html = `<div class="ia-sender">Agente <span class="ia-badge">${escHtml(msg.interaction)}</span></div>`;
    html += `<div class="ia-prompt">${escHtml(msg.prompt)}</div>`;

    if (msg.interaction === 'button' || msg.interaction === 'list') {
      const opts = msg.options || [];
      opts.forEach(opt => {
        html += `<button class="ia-opt-btn"
          onclick="submitMenu('${msg.menu_id}','${msg.interaction}','${escHtml(opt.id)}','${escHtml(opt.label)}')"
          >${escHtml(opt.label)}</button>`;
      });

    } else if (msg.interaction === 'text') {
      // Mascarado quando masked_fields contém qualquer campo (step scalar usa output_as/id como campo implícito)
      const isMasked = Array.isArray(msg.masked_fields) && msg.masked_fields.length > 0;
      const inputType   = isMasked ? 'password' : 'text';
      const placeholder = isMasked ? '••••••  (entrada segura)' : 'Sua resposta…';
      html += `<div class="ia-row">
        <input type="${inputType}" id="ia-text-${msg.menu_id}" placeholder="${placeholder}"
          class="${isMasked ? 'masked' : ''}"
          autocomplete="off" autocorrect="off" spellcheck="false"
          onkeydown="if(event.key==='Enter'){submitTextMenu('${msg.menu_id}');}">
        <button class="ok-btn" onclick="submitTextMenu('${msg.menu_id}')">OK</button>
      </div>`;
      if (isMasked) {
        html += `<div class="ia-hint">🔒 Campo seguro — conteúdo não é visível ao agente</div>`;
      }

    } else if (msg.interaction === 'form') {
      const maskedSet = new Set(msg.masked_fields || []);
      const fields    = msg.fields || [];
      // Store field metadata in a JS-safe way using a global map keyed by menu_id
      window._formMeta = window._formMeta || {};
      window._formMeta[msg.menu_id] = fields.map(f => ({
        id:       f.id || f.label,
        label:    f.label || f.id,
        isMasked: maskedSet.has(f.id || f.label),
      }));
      html += `<div id="ia-form-${escHtml(msg.menu_id)}">`;
      fields.forEach(field => {
        const fid      = field.id || field.label;
        const isMasked = maskedSet.has(fid);
        const tooltip  = isMasked
          ? 'Conteúdo seguro — não ficará visível ao agente'
          : '';
        html += `<div class="ia-field">
          <label>
            ${isMasked ? '🔒 ' : ''}${escHtml(field.label || fid)}${field.required ? ' *' : ''}
            ${tooltip ? `<span class="ia-field-tooltip" title="${tooltip}">ⓘ</span>` : ''}
          </label>
          <input type="${isMasked ? 'password' : 'text'}" class="${isMasked ? 'masked' : ''}"
            id="ia-ff-${escHtml(msg.menu_id)}-${escHtml(fid)}"
            autocomplete="off" autocorrect="off" spellcheck="false"
            placeholder="${isMasked ? 'Conteúdo seguro' : ''}">
        </div>`;
      });
      html += `<button class="ia-submit" id="ia-btn-${escHtml(msg.menu_id)}">Enviar</button>`;
      if (maskedSet.size > 0) {
        html += `<div class="ia-hint">🔒 Campos seguros — conteúdo não é visível ao agente</div>`;
      }
      html += `</div>`;

    } else if (msg.interaction === 'checklist') {
      const opts = msg.options || [];
      html += `<div id="ia-cl-${msg.menu_id}">`;
      opts.forEach(opt => {
        html += `<label class="ia-check">
          <input type="checkbox" id="ia-ck-${msg.menu_id}-${escHtml(opt.id)}" value="${escHtml(opt.id)}">
          ${escHtml(opt.label)}
        </label>`;
      });
      html += `<button class="ia-submit" id="ia-clbtn-${escHtml(msg.menu_id)}">Confirmar</button>`;
      html += `</div>`;
    }

    card.innerHTML = html;
    msgs.appendChild(card);
    msgs.scrollTop = msgs.scrollHeight;

    // Attach event listeners AFTER innerHTML is set (avoids onclick attribute parsing issues)
    if (msg.interaction === 'form') {
      const menuId = msg.menu_id;
      const btn = document.getElementById('ia-btn-' + menuId);
      if (btn) btn.addEventListener('click', function() { submitFormMenu(menuId); });
    }
    if (msg.interaction === 'checklist') {
      const menuId = msg.menu_id;
      const opts   = msg.options || [];
      const btn    = document.getElementById('ia-clbtn-' + menuId);
      if (btn) btn.addEventListener('click', function() { submitChecklistMenu(menuId, opts.map(o => o.id)); });
    }

    // Focar automaticamente no input de texto para melhor UX
    if (msg.interaction === 'text') {
      setTimeout(() => document.getElementById('ia-text-' + msg.menu_id)?.focus(), 50);
    }
  }

  // ── Menu submit helpers ──────────────────────────────────────────────────────
  function submitMenu(menuId, interaction, result, label) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'menu.submit', menu_id: menuId, interaction, result }));
    console.log('[webchat] → menu.submit', menuId, result);
    // Mostra confirmação como mensagem do usuário
    addMsg(label || result, 'out', 'Você');
    // Desabilita card para evitar dupla resposta
    const card = document.getElementById('ia-' + menuId);
    if (card) card.className = 'ia-card done';
  }

  function submitTextMenu(menuId) {
    const el  = document.getElementById('ia-text-' + menuId);
    const val = el ? el.value.trim() : '';
    if (!val) return;
    submitMenu(menuId, 'text', val, '••••••');   // nunca mostra o valor em claro no histórico
  }

  function submitFormMenu(menuId) {
    const meta = (window._formMeta || {})[menuId];
    if (!meta) { console.warn('[webchat] submitFormMenu: no meta for', menuId); return; }

    // Collect values from inputs
    const result = {};
    meta.forEach(({ id: fid }) => {
      const el = document.getElementById('ia-ff-' + menuId + '-' + fid);
      result[fid] = el ? el.value : '';
    });

    if (!ws || ws.readyState !== WebSocket.OPEN) {
      console.warn('[webchat] submitFormMenu: WS not open');
      return;
    }

    ws.send(JSON.stringify({
      type:        'menu.submit',
      menu_id:     menuId,
      interaction: 'form',
      result:      JSON.stringify(result),
    }));
    console.log('[webchat] → menu.submit (form)', menuId, Object.keys(result));

    // Replace form with submitted state showing values / •••••• for masked fields
    const formDiv = document.getElementById('ia-form-' + menuId);
    if (formDiv) {
      let html = `<div class="ia-submitted-banner">✓ Formulário enviado</div>`;
      meta.forEach(({ id: fid, label, isMasked }) => {
        const displayVal = isMasked ? '••••••' : escHtml(result[fid] || '—');
        html += `<div class="ia-field-done">
          <span class="ia-field-done-label">${isMasked ? '🔒 ' : ''}${escHtml(label)}</span>
          <span class="ia-field-done-value ${isMasked ? 'masked-done' : ''}">${displayVal}</span>
        </div>`;
      });
      formDiv.innerHTML = html;
    }

    // Mark card as done (no further interaction)
    const card = document.getElementById('ia-' + menuId);
    if (card) card.classList.add('done');
  }

  function submitChecklistMenu(menuId, allOptionIds) {
    const selected = allOptionIds.filter(id => {
      const cb = document.getElementById('ia-ck-' + menuId + '-' + id);
      return cb && cb.checked;
    });
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'menu.submit', menu_id: menuId, interaction: 'checklist', result: JSON.stringify(selected) }));
    console.log('[webchat] → menu.submit (checklist)', menuId, selected);
    addMsg('[seleção: ' + selected.join(', ') + ']', 'out', 'Você');
    const card = document.getElementById('ia-' + menuId);
    if (card) card.className = 'ia-card done';
  }

  // ── Util ────────────────────────────────────────────────────────────────────
  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
