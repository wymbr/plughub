<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>WebChat — Cliente de Teste</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #f0f4f8; height: 100vh; display: flex; align-items: center;
         justify-content: center; }
  .chat { width: 420px; height: 640px; background: white; border-radius: 16px;
          box-shadow: 0 8px 32px rgba(0,0,0,.12); display: flex; flex-direction: column;
          overflow: hidden; }
  .header { background: #4f46e5; color: white; padding: 16px 20px;
            display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 15px; font-weight: 600; }
  .status { font-size: 11px; opacity: .8; margin-top: 2px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
         background: #fbbf24; margin-right: 5px; }
  .dot.ok { background: #34d399; }
  .dot.err { background: #f87171; }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex;
              flex-direction: column; gap: 8px; }
  .msg { max-width: 80%; padding: 8px 12px; border-radius: 12px;
         font-size: 13px; line-height: 1.5; word-break: break-word; }
  .msg.in  { background: #f1f5f9; color: #1e293b; align-self: flex-start;
             border-bottom-left-radius: 4px; }
  .msg.out { background: #4f46e5; color: white; align-self: flex-end;
             border-bottom-right-radius: 4px; }
  .msg.sys { background: #fef3c7; color: #92400e; align-self: center;
             font-size: 11px; border-radius: 8px; padding: 4px 10px; }
  .label { font-size: 10px; color: #94a3b8; margin-bottom: 2px; }
  .label.right { text-align: right; }
  .input-row { display: flex; padding: 12px; border-top: 1px solid #e2e8f0; gap: 8px; }
  textarea { flex: 1; border: 1px solid #d1d5db; border-radius: 10px;
             padding: 8px 12px; font-size: 13px; resize: none; outline: none;
             font-family: inherit; }
  textarea:focus { border-color: #4f46e5; box-shadow: 0 0 0 2px rgba(79,70,229,.2); }
  button { background: #4f46e5; color: white; border: none; border-radius: 10px;
           padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500; }
  button:hover { background: #4338ca; }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .config-row { padding: 8px 12px; border-top: 1px solid #e2e8f0;
                display: flex; gap: 6px; align-items: center; }
  .config-row select, .config-row input {
    border: 1px solid #d1d5db; border-radius: 8px;
    padding: 6px 10px; font-size: 12px; outline: none; background: white; }
  .config-row select { width: 130px; }
  .config-row input { flex: 1; }
  .config-row button { padding: 6px 14px; font-size: 12px; background: #0ea5e9; flex-shrink: 0; }
  .config-row button:hover { background: #0284c7; }
  .err-detail { font-size: 10px; color: #ef4444; padding: 2px 12px 4px; display: none; }
</style>
</head>
<body>
<div class="chat">
  <div class="header">
    <div>
      <h1>PlugHub WebChat</h1>
      <div class="status"><span class="dot" id="dot"></span><span id="status-text">Desconectado</span></div>
    </div>
    <div style="font-size:11px;opacity:.7" id="session-label"></div>
  </div>

  <!-- Pool + connect row -->
  <div class="config-row">
    <select id="pool-select">
      <option value="sac_ia">sac_ia</option>
      <option value="demo_ia">demo_ia</option>
      <option value="fila_humano">fila_humano</option>
      <option value="retencao_humano">retencao_humano</option>
    </select>
    <input id="token-input" placeholder="JWT (auto-gerado se vazio)" />
    <button id="connect-btn" onclick="connect().catch(onConnectErr)">Conectar</button>
  </div>
  <div class="err-detail" id="err-detail"></div>

  <div class="messages" id="messages"></div>

  <div class="input-row">
    <textarea id="msg-input" rows="2" placeholder="Digite sua mensagem… (Enter envia)"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}"></textarea>
    <button id="send-btn" onclick="send()" disabled>Enviar</button>
  </div>
</div>

<script>
  // ── Config ─────────────────────────────────────────────────────────────────
  const WS_BASE    = 'ws://localhost:8010/ws/chat';   // + /{pool_id}
  const JWT_SECRET = 'changeme_32chars_webchat_secret!';
  const TENANT_ID  = 'tenant_demo';

  let ws        = null;
  let sessionId = null;
  let connected = false;

  // ── JWT HS256 via Web Crypto API ────────────────────────────────────────────
  function b64url(bytes) {
    // accepts Uint8Array or string
    const bin = typeof bytes === 'string' ? bytes
      : String.fromCharCode(...bytes);
    return btoa(bin).replace(/=/g, '').replace(/\+/g, '-').replace(/\//g, '_');
  }
  async function makeJWT(payload) {
    const enc    = new TextEncoder();
    const header = b64url(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
    const body   = b64url(JSON.stringify(payload));
    const input  = header + '.' + body;
    const key    = await crypto.subtle.importKey(
      'raw', enc.encode(JWT_SECRET),
      { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']
    );
    const sig    = new Uint8Array(await crypto.subtle.sign('HMAC', key, enc.encode(input)));
    return input + '.' + b64url(sig);
  }

  // ── UI helpers ──────────────────────────────────────────────────────────────
  function setStatus(label, state) {
    document.getElementById('status-text').textContent = label;
    const dot = document.getElementById('dot');
    dot.className = 'dot' + (state === 'ok' ? ' ok' : state === 'err' ? ' err' : '');
    const btn = document.getElementById('connect-btn');
    if (state === 'ok') {
      btn.textContent = 'Nova sessão';
      btn.style.background = '#059669';
      btn.title = 'Encerra este contato e abre um novo';
    } else {
      btn.textContent = 'Conectar';
      btn.style.background = '';
      btn.title = '';
    }
  }
  function showErr(msg) {
    const el = document.getElementById('err-detail');
    el.textContent = msg;
    el.style.display = msg ? 'block' : 'none';
  }
  function addMsg(text, dir, label) {
    const msgs = document.getElementById('messages');
    if (label) {
      const l = document.createElement('div');
      l.className = 'label' + (dir === 'out' ? ' right' : '');
      l.textContent = label;
      msgs.appendChild(l);
    }
    const d = document.createElement('div');
    d.className = 'msg ' + dir;
    d.textContent = text;
    msgs.appendChild(d);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function onConnectErr(e) {
    console.error(e);
    setStatus('Erro JWT', 'err');
    showErr(String(e));
  }

  // ── Connect ─────────────────────────────────────────────────────────────────
  async function connect() {
    if (ws) { ws.close(); ws = null; connected = false; }
    // Clear token so a new contact_id is generated for each new session
    document.getElementById('token-input').value = '';
    document.getElementById('send-btn').disabled = true;
    document.getElementById('messages').innerHTML = '';
    document.getElementById('session-label').textContent = '';
    showErr('');
    setStatus('Conectando…', '');

    const poolId = document.getElementById('pool-select').value;
    let token    = document.getElementById('token-input').value.trim();

    if (!token) {
      const now = Math.floor(Date.now() / 1000);
      token = await makeJWT({
        sub:       'cliente-demo-' + Date.now(),
        tenant_id: TENANT_ID,
        channel:   'webchat',
        iat:       now,
        exp:       now + 3600,
      });
      document.getElementById('token-input').value = token;
    }

    const url = `${WS_BASE}/${poolId}`;
    console.log('[webchat] connecting to', url);
    ws = new WebSocket(url);

    ws.onopen = () => {
      setStatus('Aguardando handshake…', '');
      console.log('[webchat] WS open');
    };

    ws.onmessage = (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      console.log('[webchat] ←', msg);

      if (msg.type === 'conn.hello') {
        ws.send(JSON.stringify({ type: 'conn.authenticate', token }));
        return;
      }
      if (msg.type === 'conn.authenticated') {
        sessionId = msg.session_id;
        connected = true;
        setStatus('Conectado', 'ok');
        document.getElementById('session-label').textContent =
          sessionId ? sessionId.slice(0,8)+'…' : '';
        document.getElementById('send-btn').disabled = false;
        addMsg('Conectado ao suporte. Aguardando agente…', 'sys');
        return;
      }
      if (msg.type === 'conn.error') {
        const detail = msg.message || msg.code || JSON.stringify(msg);
        setStatus('Erro auth', 'err');
        showErr('conn.error: ' + detail);
        addMsg('Erro: ' + detail, 'sys');
        return;
      }
      if (msg.type === 'msg.text') {
        const isAgent = msg.author && msg.author.type !== 'customer';
        addMsg(msg.text || msg.content || '',
               isAgent ? 'in' : 'out',
               isAgent ? (msg.author.name || 'Agente') : null);
        return;
      }
      if (msg.type === 'presence.agent_joined') {
        addMsg('Agente entrou no atendimento', 'sys');
        return;
      }
      if (msg.type === 'conn.session_ended') {
        setStatus('Sessão encerrada', 'err');
        addMsg('Atendimento encerrado.', 'sys');
        document.getElementById('send-btn').disabled = true;
        connected = false;
        return;
      }
      if (msg.type === 'interaction.request') {
        addMsg('[Menu] ' + msg.prompt, 'in', 'Sistema');
        return;
      }
    };

    ws.onerror = (e) => {
      console.error('[webchat] WS error', e);
      setStatus('Erro de conexão', 'err');
      showErr('Verifique se o channel-gateway está rodando em localhost:8010');
    };
    ws.onclose = (e) => {
      console.log('[webchat] WS closed', e.code, e.reason);
      if (connected) { setStatus('Desconectado', 'err'); connected = false; }
    };
  }

  // ── Send message ────────────────────────────────────────────────────────────
  function send() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    const envelope = { type: 'msg.text', id: 'msg-' + Date.now(), text };
    console.log('[webchat] →', envelope);
    ws.send(JSON.stringify(envelope));
    addMsg(text, 'out', 'Você');
    input.value = '';
    input.focus();
  }
</script>
</body>
</html>
