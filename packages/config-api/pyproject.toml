[project]
name            = "plughub-config-api"
version         = "1.0.0"
description     = "PlugHub Platform — Configuration Management API"
requires-python = ">=3.10"
dependencies    = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "asyncpg>=0.29.0",
    "redis[hiredis]>=5.2.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
]

[project.scripts]
plughub-config-api = "plughub_config_api.main:run"
plughub-config-seed = "plughub_config_api.seed:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["src/plughub_config_api/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/plughub_config_api"]
