[project]
name            = "plughub-routing-engine"
version         = "1.0.0"
description     = "PlugHub Platform — Routing Engine (árbitro único de alocação)"
requires-python = ">=3.11"
dependencies    = [
    "aiokafka>=0.11.0",
    "redis[hiredis]>=5.2.0",
    "httpx>=0.27.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "pyyaml>=6.0.0",
]

[project.scripts]
plughub-routing = "plughub_routing.main:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["src/plughub_routing/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/plughub_routing"]
