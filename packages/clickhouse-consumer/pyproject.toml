[project]
name            = "plughub-clickhouse-consumer"
version         = "1.0.0"
description     = "PlugHub Platform — ClickHouse Consumer (evaluation results persistence)"
requires-python = ">=3.10"
dependencies    = [
    "aiokafka>=0.11.0",
    "clickhouse-connect>=0.7.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
]

[project.scripts]
plughub-clickhouse-consumer = "plughub_clickhouse_consumer.main:run"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["src/plughub_clickhouse_consumer/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/plughub_clickhouse_consumer"]
