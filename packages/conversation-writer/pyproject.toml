[project]
name            = "plughub-conversation-writer"
version         = "1.0.0"
description     = "PlugHub Platform — Conversation Writer (transcript aggregation and persistence)"
requires-python = ">=3.10"
dependencies    = [
    "aiokafka>=0.11.0",
    "asyncpg>=0.30.0",
    "redis[hiredis]>=5.2.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
]

[project.scripts]
plughub-conversation-writer = "plughub_conversation_writer.main:run"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["src/plughub_conversation_writer/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/plughub_conversation_writer"]
