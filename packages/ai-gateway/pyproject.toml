[project]
name            = "plughub-ai-gateway"
version         = "1.0.0"
description     = "PlugHub Platform — AI Gateway (ponto único de acesso a LLMs)"
requires-python = ">=3.11"
dependencies    = [
    "anthropic>=0.40.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "redis[hiredis]>=5.2.0",
]

[project.scripts]
plughub-ai-gateway = "plughub_ai_gateway.main:app"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["src/plughub-ai-gateway/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/plughub_ai_gateway"]
