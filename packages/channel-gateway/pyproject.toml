[project]
name            = "plughub-channel-gateway"
version         = "1.0.0"
description     = "PlugHub Platform — Channel Gateway (normalização e bridge de canais)"
requires-python = ">=3.10"
dependencies    = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "websockets>=13.0",
    "aiokafka>=0.11.0",
    "redis[hiredis]>=5.2.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    # Attachment storage
    "asyncpg>=0.29.0",
    "aiofiles>=23.2.1",
    # JWT customer token validation
    "PyJWT>=2.8.0",
]

[project.scripts]
plughub-channel-gateway = "plughub_channel_gateway.main:run"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["src/plughub_channel_gateway/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/plughub_channel_gateway"]
