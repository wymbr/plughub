[project]
name            = "plughub-rules-engine"
version         = "1.0.0"
description     = "PlugHub Platform — Rules Engine (monitoramento reativo)"
requires-python = ">=3.11"
dependencies    = [
    "redis[hiredis]>=5.2.0",
    "httpx>=0.27.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "aiokafka>=0.9.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
]

[project.scripts]
plughub-rules = "plughub_rules.main:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "httpx>=0.27.0",
]

[build-system]
requires      = ["hatchling"]
build-backend = "hatchling.build"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths    = ["src/plughub_rules/tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/plughub_rules"]
