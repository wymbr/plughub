[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "plughub-dashboard-api"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.111.0",
    "uvicorn[standard]>=0.29.0",
    "clickhouse-connect>=0.7.16",
    "pydantic>=2.7.1",
    "pydantic-settings>=2.3.0",
]

[project.scripts]
plughub-dashboard-api = "plughub_dashboard_api.__main__:main"

[project.optional-dependencies]
dev = [
    "pytest>=8.2.0",
    "httpx>=0.27.0",
]

[tool.hatch.build.targets.wheel]
packages = ["plughub_dashboard_api"]

[tool.pytest.ini_options]
testpaths = ["tests"]
